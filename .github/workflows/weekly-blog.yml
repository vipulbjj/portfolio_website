name: Generate Weekly Blog

on:
  schedule:
    # 00:00 UTC every Sunday
    - cron: '0 0 * * 0'
  workflow_dispatch:

concurrency:
  group: weekly-blog
  cancel-in-progress: false

jobs:
  generate-blog:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai

      - name: Run Blog Generation Script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_blog.py

      - name: Validate blogs.json
        run: python -c "import json; json.load(open('data/blogs.json')); print('blogs.json OK')"

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/blogs.json
          if git diff --staged --quiet; then
            echo "No blog changes to commit (likely already published this week)."
            exit 0
          fi
          git commit -m "docs(blog): add weekly philosophical musing"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break || sleep 5
          done
